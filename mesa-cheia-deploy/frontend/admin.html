<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Mesa Cheia</title>
  <meta name="description" content="Painel administrativo da Mesa Cheia (acesso restrito).">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/"><img src="/img/logo-meeple.svg" alt="" width="34" height="34"><span>Mesa <b>Cheia</b></span></a>
      <nav class="main-nav" aria-label="Navegação"><a href="/">← Voltar à loja</a></nav>
      <a class="cart-link" href="/carrinho" aria-label="Carrinho de compras" style="margin-left:auto">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
        <span class="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container">
    <!-- Portão de login (visível por padrão) -->
    <section id="gate" class="admin-gate">
      <h1>Acesso restrito</h1>
      <p style="color:var(--ink-soft);margin-bottom:1rem;font-size:.92rem">Apenas usuários administradores (isAdmin) podem cadastrar e remover produtos.</p>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" value="admin@mesacheia.com">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-block" id="loginBtn">Entrar</button>
    </section>

    <!-- Painel (escondido até logar) -->
    <section id="panel" hidden>
      <div class="admin-bar">
        <div>
          <p class="eyebrow">Painel administrativo</p>
          <h1 style="font-size:1.8rem">Gerenciar produtos</h1>
        </div>
        <div>
          <span id="who" style="margin-right:1rem;font-weight:700"></span>
          <button class="btn" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="admin-grid">
        <!-- Formulário de cadastro -->
        <div>
          <h2 class="section-title" style="font-size:1.3rem;margin-bottom:1rem">Novo produto</h2>
          <div class="field"><label for="f-name">Nome *</label><input id="f-name" type="text"></div>
          <div class="field"><label for="f-cat">Categoria *</label>
            <select id="f-cat">
              <option>Estrategia</option><option>Familia</option><option>Party</option><option>Cooperativo</option>
            </select>
          </div>
          <div class="admin-grid">
            <div class="field"><label for="f-price">Preço (R$) *</label><input id="f-price" type="number" step="0.01" min="0"></div>
            <div class="field"><label for="f-old">Preço antigo</label><input id="f-old" type="number" step="0.01" min="0"></div>
          </div>
          <div class="field"><label for="f-desc">Descrição</label><textarea id="f-desc"></textarea></div>
          <div class="field"><label for="f-image">Imagem (URL)</label><input id="f-image" type="text" placeholder="/img/exemplo.svg"></div>
          <div class="admin-grid">
            <div class="field"><label for="f-players">Jogadores</label><input id="f-players" type="text" placeholder="2-4"></div>
            <div class="field"><label for="f-playtime">Duração</label><input id="f-playtime" type="text" placeholder="30-60 min"></div>
            <div class="field"><label for="f-stock">Estoque</label><input id="f-stock" type="number" min="0" value="10"></div>
            <div class="field"><label for="f-weight">Complexidade</label><input id="f-weight" type="number" step="0.1" min="0" max="5" placeholder="2.5"></div>
            <div class="field"><label for="f-designer">Designer</label><input id="f-designer" type="text"></div>
            <div class="field"><label for="f-mechanic">Mecânica</label><input id="f-mechanic" type="text"></div>
          </div>
          <button class="btn btn-primary btn-block" id="createBtn">Cadastrar produto</button>
        </div>

        <!-- Lista de produtos com ação de deletar -->
        <div>
          <h2 class="section-title" style="font-size:1.3rem;margin-bottom:1rem">Produtos cadastrados</h2>
          <table class="admin-table">
            <thead><tr><th>ID</th><th>Nome</th><th>Preço</th><th></th></tr></thead>
            <tbody id="prodTable"><tr><td colspan="4">Carregando…</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom"><div class="container">© 2026 Mesa Cheia · TDE de Programação Web · URI Erechim</div></div>
  </footer>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
