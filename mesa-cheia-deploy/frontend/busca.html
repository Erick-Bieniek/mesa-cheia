<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Busca — Mesa Cheia</title>
  <meta name="description" content="Encontre board games por nome, categoria, mecânica ou designer. Filtros e ordenação na Mesa Cheia.">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/"><img src="/img/logo-meeple.svg" alt="" width="34" height="34"><span>Mesa <b>Cheia</b></span></a>
      <nav class="main-nav" aria-label="Categorias">
        <a href="/busca?cat=Estrategia">Estratégia</a>
        <a href="/busca?cat=Familia">Família</a>
        <a href="/busca?cat=Party">Party</a>
        <a href="/busca?cat=Cooperativo">Cooperativo</a>
      </nav>
      <form class="search-form" role="search" action="/busca" method="get">
        <label class="visually-hidden" for="q">Buscar jogos</label>
        <input id="q" name="query" type="search" placeholder="Buscar jogos, mecânicas, designers…" autocomplete="off">
        <button type="submit" aria-label="Buscar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
      </form>
      <a class="cart-link" href="/carrinho" aria-label="Carrinho de compras">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
        <span class="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <p class="eyebrow" id="crumb">Catálogo</p>
      <h1 id="pageTitle">Todos os jogos</h1>
    </div>

    <div class="list-layout">
      <aside class="filters" aria-label="Filtros">
        <h3>Filtrar</h3>
        <div class="filter-group">
          <span>Categoria</span>
          <div id="catFilters"><!-- radios via JS --></div>
        </div>
        <button class="btn btn-block" id="clearFilters">Limpar filtros</button>
      </aside>

      <section aria-label="Resultados">
        <div class="list-topbar">
          <p class="result-count" id="resultCount" aria-live="polite">Carregando…</p>
          <label>
            <span class="visually-hidden">Ordenar por</span>
            <select class="sort-select" id="sortSelect">
              <option value="relevance">Relevância</option>
              <option value="price-asc">Menor preço</option>
              <option value="price-desc">Maior preço</option>
              <option value="name">Nome (A–Z)</option>
            </select>
          </label>
        </div>

        <div class="grid grid--list" id="resultsGrid" aria-live="polite"></div>
        <nav class="pagination" id="pagination" aria-label="Paginação"></nav>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom"><div class="container">© 2026 Mesa Cheia · TDE de Programação Web · URI Erechim</div></div>
  </footer>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/busca.js"></script>
</body>
</html>
